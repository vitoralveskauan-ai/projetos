<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Card da Copa</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a2a6c;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .card {
            background: linear-gradient(135deg, #f12711, #f5af19);
            width: 320px;
            height: 480px;
            border-radius: 20px;
            border: 5px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            padding: 20px;
            color: white;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 20px;
            font-weight: bold;
        }

        .player-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #fff;
            margin-top: 20px;
            object-fit: cover;
        }

        .player-name {
            font-size: 28px;
            font-weight: bold;
            margin-top: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        .player-info {
            margin-top: auto;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 10px;
            width: 80%;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">
            <span>95</span> <!-- Overall -->
            <span>ATA</span> <!-- Posição -->
        </div>
        <img src="https://placeholder.com" alt="Foto do Jogador" class="player-img">
        <div class="player-name">CRAQUE</div>
        <div class="player-info">
            <p>Brasil 🇧🇷</p>
        </div>
    </div>

</body>
</html>
